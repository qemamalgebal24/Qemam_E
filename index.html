function payrollCostForProject(projectName, sheets, entries, employees) {
  let total = 0;
  entries.forEach((e) => {
    const sheet = sheets.find((s) => s.id === e.sheet_id);
    if (!sheet) return;
    const salary = Number(e.salary) || 0;
    const dayValue = sheet.days ? salary / sheet.days : 0;
    (e.cells || []).forEach((v) => { if (v === projectName) total += dayValue; });
  });
  return total;
}

function ProjectProfile({ project, clientContracts, payments, transactions, govFees, officeExpenses, sheets, entries, employees, canEdit, guard, flash, reload, onClose }) {
  const pcs = clientContracts.filter((c) => c.project_id === project.id);
  const pays = payments.filter((p) => p.project_id === project.id);
  const pgf = govFees.filter((g) => g.project_id === project.id);
  const poe = officeExpenses.filter((o) => o.project_id === project.id);
  const [settleFor, setSettleFor] = useState(null);

  const payrollCost = payrollCostForProject(project.name, sheets, entries, employees);
  const govFeesCost = pgf.filter((g) => g.payer_type === "الشركة" && g.paid_status === "مدفوع").reduce((a, g) => a + Number(g.amount || 0), 0);
  const officeCost = poe.reduce((a, o) => a + Number(o.amount || 0), 0);
  const totalCost = payrollCost + govFeesCost + officeCost;
  const contractValue = pcs.reduce((a, c) => a + Number(c.value || 0), 0);
  const collected = pays.reduce((a, p) => a + Number(p.paid_amount || 0), 0);
  const dueTotal = pays.reduce((a, p) => a + Number(p.amount || 0), 0);
  const profit = collected - totalCost;

  const addContract = async () => {
    if (!guard()) return;
    const { error } = await sb.from("client_contracts").insert({ project_id: project.id, contract_no: "", cdate: new Date().toISOString().slice(0, 10), value: 0, vat_rate: 5 });
    if (error) flash("خطأ: " + error.message); else reload();
  };
  const patchContract = async (id, field, val) => {
    if (!guard()) return;
    await sb.from("client_contracts").update({ [field]: val }).eq("id", id); reload();
  };
  const delContract = async (id) => {
    if (!guard()) return;
    if (!confirm("حذف العقد؟")) return;
    await sb.from("client_contracts").delete().eq("id", id); reload();
  };

  const addPayment = async () => {
    if (!guard()) return;
    const { error } = await sb.from("project_payments").insert({ project_id: project.id, title: "دفعة", amount: 0, sort_order: pays.length });
    if (error) flash("خطأ: " + error.message); else reload();
  };
  const patchPayment = async (id, field, val) => {
    if (!guard()) return;
    await sb.from("project_payments").update({ [field]: val }).eq("id", id); reload();
  };
  const delPayment = async (id) => {
    if (!guard()) return;
    if (!confirm("حذف الدفعة؟")) return;
    await sb.from("project_payments").delete().eq("id", id); reload();
  };

  const inp = "w-full text-xs rounded border border-slate-200 px-2 py-1.5";

  return (
    <div className="bg-white rounded-xl border border-slate-200 p-4 mt-3">
      <div className="flex justify-between items-start mb-4">
        <div>
          <h3 className="text-base font-bold" style={{ color: NAVY }}>{project.name}</h3>
          <div className="text-xs text-slate-500">{project.owner} — {project.project_type} — <span className="font-medium">{project.status}</span></div>
        </div>
        <button onClick={onClose} className="text-xs text-slate-400 hover:text-slate-700">✕ إغلاق</button>
      </div>

      <div className="flex flex-wrap gap-3 mb-5">
        <StatCard label="قيمة العقود" value={fmt0(contractValue) + " د.إ"} />
        <StatCard label="المحصّل" value={fmt0(collected) + " د.إ"} color="#1E4620" />
        <StatCard label="المستحق (غير محصّل)" value={fmt0(dueTotal - collected) + " د.إ"} color="#C0504D" />
        <StatCard label="تكلفة المشروع (رواتب+رسوم+مصروفات)" value={fmt0(totalCost) + " د.إ"} />
        <StatCard label="الربح التقديري" value={fmt0(profit) + " د.إ"} color={profit >= 0 ? "#1E4620" : "#C0504D"} />
      </div>

      <div className="grid md:grid-cols-2 gap-4">
        <div>
          <div className="flex justify-between items-center mb-2">
            <h4 className="text-sm font-bold" style={{ color: NAVY }}>عقود العميل</h4>
            {canEdit && <button onClick={addContract} style={{ background: "#16A34A" }} className="text-white text-[11px] px-2 py-1 rounded">➕ عقد</button>}
          </div>
          <div className="space-y-2">
            {pcs.map((c) => (
              <div key={c.id} className="border border-slate-200 rounded-lg p-2 grid grid-cols-2 gap-1">
                <input disabled={!canEdit} placeholder="رقم العقد" defaultValue={c.contract_no} onBlur={(e) => patchContract(c.id, "contract_no", e.target.value)} className={inp} />
                <input disabled={!canEdit} type="date" defaultValue={c.cdate || ""} onBlur={(e) => patchContract(c.id, "cdate", e.target.value)} className={inp} />
                <input disabled={!canEdit} type="number" placeholder="القيمة" defaultValue={c.value} onBlur={(e) => patchContract(c.id, "value", Number(e.target.value) || 0)} className={inp} />
                <input disabled={!canEdit} type="number" placeholder="ضريبة %" defaultValue={c.vat_rate} onBlur={(e) => patchContract(c.id, "vat_rate", Number(e.target.value) || 0)} className={inp} />
                <input disabled={!canEdit} placeholder="شروط الدفع" defaultValue={c.payment_terms} onBlur={(e) => patchContract(c.id, "payment_terms", e.target.value)} className={inp + " col-span-2"} />
                {canEdit && <button onClick={() => delContract(c.id)} className="text-[11px] text-red-600 hover:underline col-span-2 text-right">🗑 حذف</button>}
              </div>
            ))}
            {!pcs.length && <div className="text-xs text-slate-400">لا يوجد عقود بعد</div>}
          </div>

          <div className="flex justify-between items-center mt-4 mb-2">
            <h4 className="text-sm font-bold" style={{ color: NAVY }}>الرسوم الحكومية والمصروفات</h4>
          </div>
          <div className="text-xs text-slate-500">
            رسوم حكومية: {pgf.length} بند — إجمالي {fmt0(pgf.reduce((a, g) => a + Number(g.amount || 0), 0))} د.إ<br/>
            مصروفات مكتب مرتبطة: {poe.length} بند — إجمالي {fmt0(officeCost)} د.إ<br/>
            <span className="text-[11px] text-slate-400">(أضِف أو عدّل من تبويبَي "الرسوم الحكومية" و"مصروفات المكتب" مباشرة)</span>
          </div>
        </div>

        <div>
          <div className="flex justify-between items-center mb-2">
            <h4 className="text-sm font-bold" style={{ color: NAVY }}>الدفعات والمستحقات</h4>
            {canEdit && <button onClick={addPayment} style={{ background: "#16A34A" }} className="text-white text-[11px] px-2 py-1 rounded">➕ دفعة</button>}
          </div>
          <div className="space-y-2">
            {pays.map((p) => {
              const remaining = Number(p.amount || 0) - Number(p.paid_amount || 0);
              return (
                <div key={p.id} className="border border-slate-200 rounded-lg p-2">
                  <div className="grid grid-cols-2 gap-1 mb-1">
                    <input disabled={!canEdit} placeholder="بيان الدفعة" defaultValue={p.title} onBlur={(e) => patchPayment(p.id, "title", e.target.value)} className={inp} />
                    <input disabled={!canEdit} type="date" defaultValue={p.due_date || ""} onBlur={(e) => patchPayment(p.id, "due_date", e.target.value)} className={inp} />
                    <input disabled={!canEdit} type="number" placeholder="المبلغ المستحق" defaultValue={p.amount} onBlur={(e) => patchPayment(p.id, "amount", Number(e.target.value) || 0)} className={inp} />
                    <div className={inp + " bg-slate-50 text-center"}>محصّل: {fmt0(p.paid_amount)}</div>
                  </div>
                  <div className="flex justify-between items-center">
                    <span className="text-[11px] px-2 py-0.5 rounded-full text-white" style={{ background: p.status === "محصل بالكامل" ? "#16A34A" : p.status === "محصل جزئياً" ? "#F59E0B" : "#94A3B8" }}>{p.status}</span>
                    <div className="flex gap-2">
                      {canEdit && remaining > 0 && <button onClick={() => setSettleFor(p)} className="text-[11px] text-blue-700 hover:underline">💰 تحصيل</button>}
                      {canEdit && <button onClick={() => delPayment(p.id)} className="text-[11px] text-red-600 hover:underline">🗑</button>}
                    </div>
                  </div>
                </div>
              );
            })}
            {!pays.length && <div className="text-xs text-slate-400">لا يوجد دفعات بعد</div>}
          </div>
        </div>
      </div>
      {settleFor && <SettleModal payment={settleFor} onClose={() => setSettleFor(null)} flash={flash} reload={reload} />}
    </div>
  );
}

function SettleModal({ payment, onClose, flash, reload }) {
  const remaining = Number(payment.amount || 0) - Number(payment.paid_amount || 0);
  const [amount, setAmount] = useState(remaining);
  const [pdate, setPdate] = useState(new Date().toISOString().slice(0, 10));
  const [method, setMethod] = useState("تحويل بنكي");
  const [refNo, setRefNo] = useState("");

  const submit = async () => {
    const amt = Math.min(Number(amount) || 0, remaining);
    if (amt <= 0) return;
    const newPaid = Number(payment.paid_amount || 0) + amt;
    const newStatus = newPaid >= Number(payment.amount || 0) ? "محصل بالكامل" : "محصل جزئياً";
    await sb.from("payment_transactions").insert({ payment_id: payment.id, amount: amt, pdate, method, ref_no: refNo });
    await sb.from("project_payments").update({ paid_amount: newPaid, status: newStatus }).eq("id", payment.id);
    flash("تم تسجيل التحصيل"); reload(); onClose();
  };
  const inp = "w-full border border-slate-300 rounded-lg px-3 py-2 text-sm";
  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-xl p-5 w-full max-w-sm">
        <h3 className="font-bold text-base mb-4" style={{ color: NAVY }}>💰 تسجيل تحصيل — {payment.title}</h3>
        <div className="text-xs text-slate-500 mb-3">المتبقي: {fmt0(remaining)} د.إ</div>
        <label className="text-xs text-slate-500 block mb-1">المبلغ المحصّل</label>
        <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} className={inp + " mb-3"} />
        <label className="text-xs text-slate-500 block mb-1">التاريخ</label>
        <input type="date" value={pdate} onChange={(e) => setPdate(e.target.value)} className={inp + " mb-3"} />
        <label className="text-xs text-slate-500 block mb-1">طريقة التحصيل</label>
        <select value={method} onChange={(e) => setMethod(e.target.value)} className={inp + " mb-3"}>
          <option>تحويل بنكي</option><option>نقدي</option><option>شيك</option>
        </select>
        <label className="text-xs text-slate-500 block mb-1">رقم مرجعي (اختياري)</label>
        <input value={refNo} onChange={(e) => setRefNo(e.target.value)} className={inp + " mb-4"} />
        <div className="flex gap-2">
          <button onClick={onClose} className="flex-1 text-sm py-2 rounded-lg border border-slate-300 hover:bg-slate-50">إلغاء</button>
          <button onClick={submit} style={{ background: "#16A34A" }} className="flex-1 text-sm py-2 rounded-lg text-white hover:opacity-90">تأكيد التحصيل</button>
        </div>
      </div>
    </div>
  );
}

function ProjectsView({ projects, employees, sheets, entries, clientContracts, payments, transactions, govFees, officeExpenses, canEdit, guard, flash, reload }) {
  const [sel, setSel] = useState(null);
  const addProject = async () => {
    if (!guard()) return;
    const nextNo = Math.max(104, ...projects.map((p) => p.project_no || 0)) + 1;
    const colors = ["#2E75B6", "#16A34A", "#C0504D", "#7C3AED", "#0E7490", "#EA580C"];
    const { error } = await sb.from("projects").insert({ name: "مشروع جديد", project_no: nextNo, status: "جارٍ", color: colors[projects.length % colors.length], active: true, sort_order: projects.length });
    if (error) flash("خطأ: " + error.message); else reload();
  };
  const patch = async (id, field, val) => {
    if (!guard()) return;
    await sb.from("projects").update({ [field]: val }).eq("id", id); reload();
  };
  const inp = "w-full text-xs rounded border border-slate-200 px-2 py-1.5";
  const th = "px-2 py-2 text-xs font-bold text-white text-center whitespace-nowrap";
  const selected = projects.find((p) => p.id === sel);

  return (
    <div>
      <div className="flex justify-between items-center mb-3">
        <h2 className="text-lg font-bold" style={{ color: NAVY }}>المشاريع</h2>
        {canEdit && <button onClick={addProject} style={{ background: "#16A34A" }} className="text-white text-xs px-3 py-1.5 rounded-md hover:opacity-90">➕ مشروع جديد</button>}
      </div>
      <div className="bg-white rounded-xl border border-slate-200 overflow-x-auto">
        <table className="w-full text-xs border-collapse">
          <thead><tr>
            {["رقم", "اسم المشروع", "المالك", "النوع", "الحالة", "تاريخ البدء", "الميزانية التقديرية", "ملف"].map((h) => <th key={h} className={th} style={{ background: NAVY }}>{h}</th>)}
          </tr></thead>
          <tbody>
            {projects.map((p) => (
              <tr key={p.id} className="hover:bg-slate-50 border-b border-slate-100">
                <td className="px-1 py-1 text-center font-bold" style={{ color: NAVY }}>{p.project_no || "—"}</td>
                <td className="px-1 py-1"><input disabled={!canEdit} defaultValue={p.name} onBlur={(e) => patch(p.id, "name", e.target.value)} className={inp} /></td>
                <td className="px-1 py-1"><input disabled={!canEdit} defaultValue={p.owner || ""} onBlur={(e) => patch(p.id, "owner", e.target.value)} className={inp} /></td>
                <td className="px-1 py-1"><input disabled={!canEdit} defaultValue={p.project_type || ""} onBlur={(e) => patch(p.id, "project_type", e.target.value)} className={inp} placeholder="سكني/تجاري..." /></td>
                <td className="px-1 py-1">
                  <select disabled={!canEdit} defaultValue={p.status || "جارٍ"} onChange={(e) => patch(p.id, "status", e.target.value)} className={inp}>
                    <option>جارٍ</option><option>منتهٍ</option><option>متوقف</option>
                  </select>
                </td>
                <td className="px-1 py-1"><input disabled={!canEdit} type="date" defaultValue={p.start_date || ""} onBlur={(e) => patch(p.id, "start_date", e.target.value)} className={inp} /></td>
                <td className="px-1 py-1"><input disabled={!canEdit} type="number" defaultValue={p.budget_amount || 0} onBlur={(e) => patch(p.id, "budget_amount", Number(e.target.value) || 0)} className={inp} /></td>
                <td className="px-1 py-1 text-center"><button onClick={() => setSel(p.id)} className="text-blue-700 hover:underline text-xs">فتح ↗</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {selected && (
        <ProjectProfile project={selected} clientContracts={clientContracts} payments={payments} transactions={transactions}
          govFees={govFees} officeExpenses={officeExpenses} sheets={sheets} entries={entries} employees={employees}
          canEdit={canEdit} guard={guard} flash={flash} reload={reload} onClose={() => setSel(null)} />
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div dir="rtl" style={{ padding: 20, margin: 20, fontFamily: "Tahoma,Arial,sans-serif", color: "#b91c1c", background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 10, lineHeight: 1.8 }}>
          <b>⚠ حصل خطأ داخل النظام:</b><br />{String((this.state.error && this.state.error.message) || this.state.error)}
          <br /><span style={{ fontSize: 12, color: "#7f1d1d" }}>جرّب تحديث الصفحة. لو استمرت المشكلة، افتح F12 &gt; Console وابعتلي نص الرسالة الحمراء.</span>
        </div>
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ErrorBoundary><App /></ErrorBoundary>);
</script>
</body>
</html>
