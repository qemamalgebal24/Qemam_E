const fmt2 = (n) => (Number(n) || 0).toLocaleString("en-US", { maximumFractionDigits: 2 });
const uid = () => Date.now() + "_" + Math.floor(Math.random() * 100000);

const STATUSES = ["الجمعة", "السبت", "غياب", "غياب ✗", "مرضي", "إجازة", "اجازة", "عيد", "الأضحى", "المبارك", "ترك العمل"];
const ABS = ["غياب", "غياب ✗"];
const SICK = ["مرضي", "إجازة", "اجازة"];
const PAID_STATUS = ["الجمعة", "السبت", "مرضي", "إجازة", "اجازة", "عيد", "الأضحى", "المبارك"];

// بعض لوحات المفاتيح (خصوصًا الموبايل) بتكتب أرقام عربية (١٢٣) بدل الإنجليزية (123)،
// و Number("١٢٣") بترجع NaN فتتحول لـ 0 من غير أي تنبيه. الدالة دي بتحوّل أي رقم عربي لإنجليزي قبل التحويل.
function toNum(v) {
  if (v == null) return 0;
  const norm = String(v).replace(/[٠-٩]/g, (d) => "٠١٢٣٤٥٦٧٨٩".indexOf(d)).replace(/[۰-۹]/g, (d) => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
  const n = Number(norm);
  return isNaN(n) ? 0 : n;
}
const STATUS_COLORS = {
  "الجمعة": "#E2E8F0", "السبت": "#E2E8F0", "غياب": "#E11D48", "غياب ✗": "#E11D48",
  "مرضي": "#F59E0B", "إجازة": "#A855F7", "اجازة": "#A855F7", "عيد": "#0EA5A4",
  "المبارك": "#0EA5A4", "الأضحى": "#0EA5A4", "ترك العمل": "#64748B"
};

function projectColor(projects, name) {
  const p = projects.find((p) => p.name === name);
  return p ? (p.color || "#2E75B6") : null;
}
function cellStyle(projects, v) {
  const pc = projectColor(projects, v);
  if (pc) return { bg: pc, fg: "#fff" };
  if (STATUS_COLORS[v]) {
    const dark = ["الجمعة", "السبت"].includes(v);
    return { bg: STATUS_COLORS[v], fg: dark ? "#334155" : "#fff" };
  }
  if (v) return { bg: "#FEF3C7", fg: "#92400E" };
  return { bg: "#fff", fg: "#cbd5e1" };
}
function resStatus(expiry) {
  if (!expiry) return { label: "—", color: "#94a3b8", bg: "#f1f5f9" };
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const exp = new Date(expiry + "T00:00:00");
  if (isNaN(exp.getTime())) return { label: "—", color: "#94a3b8", bg: "#f1f5f9" };
  const days = Math.round((exp - today) / 86400000);
  if (days < 0) return { label: "منتهية ❌", color: "#fff", bg: "#E11D48" };
  if (days <= 30) return { label: "تنتهي خلال " + days + " يوم ⚠️", color: "#fff", bg: "#F59E0B" };
  return { label: "سارية ✅", color: "#fff", bg: "#16A34A" };
}
function cellShort(v, projects) {
  if (!v) return "";
  const pIdx = projects.findIndex((p) => p.name === v);
  if (pIdx >= 0) return String(pIdx + 1);
  if (ABS.includes(v)) return "غ";
  if (v === "مرضي") return "م";
  if (v === "إجازة" || v === "اجازة") return "إ";
  if (v === "الجمعة" || v === "السبت") return "·";
  return "…";
}
function calcEntry(entry, days, projects) {
  let working = 0, absence = 0, sick = 0, paidOther = 0;
  (entry.cells || []).forEach((v) => {
    if (!v) return;
    if (projectColor(projects, v) !== null) { working++; return; }
    if (ABS.includes(v)) { absence++; return; }
    if (SICK.includes(v)) { sick++; paidOther++; return; }
    if (PAID_STATUS.includes(v)) { paidOther++; return; }
    // قيمة موجودة في الخلية لكن مش متطابقة مع مشروع حالي أو حالة معروفة
    // (زي مشروع اتغيّر اسمه) — تُحسب كيوم عمل بدل ما تتجاهل وتضيع من المرتب
    working++;
  });
  const salary = Number(entry.salary) || 0;
  const otHours = Number(entry.ot_hours) || 0;
  const otRate = Number(entry.ot_rate) || 0;
  const adv = Math.max(Number(entry.advances) || 0, 0);
  const ded = Math.max(Number(entry.deductions) || 0, 0);
  const dayValue = days ? salary / days : 0;
  const otAllow = otHours * otRate;
  const paidDays = working + paidOther;
  const gross = salary === 0 ? 0 : paidDays * dayValue;
  const net = salary === 0 ? 0 : gross + otAllow - adv - ded;
  return { working, absence, sick, paidDays, gross, otAllow, adv, ded, net };
}

function Toast({ msg }) {

}

function RoleBadge({ role }) {

function LoginScreen({ onLoggedIn }) {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [fullName, setFullName] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    setErr(""); setBusy(true);
    try {
      if (mode === "signin") {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else {
        const { error } = await sb.auth.signUp({
          email, password, options: { data: { full_name: fullName } }
        });
        if (error) throw error;
        setErr("تم إنشاء الحساب. لو مفعّل تأكيد الإيميل من إعدادات Supabase، افتح بريدك للتأكيد ثم سجّل دخول.");
        setMode("signin");
        setBusy(false);
        return;
      }
    } catch (e2) {
      setErr(e2.message || "حصل خطأ، حاول تاني");
    }
    setBusy(false);
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-slate-100" dir="rtl">
      <div className="bg-white rounded-2xl shadow-md border border-slate-200 w-full max-w-sm p-6">
        <div className="flex items-center gap-3 mb-6">
          <img src={LOGO} alt="شعار الشركة" className="h-12 w-auto" />
          <div>
            <div className="font-bold text-base" style={{ color: NAVY }}>قمم الجبال للمقاولات</div>
            <div className="text-xs text-slate-400">نظام الرواتب والمشاريع والمستندات</div>
          </div>
        </div>
        <form onSubmit={submit} className="space-y-3">
          {mode === "signup" && (
            <div>
              <label className="text-xs text-slate-500 block mb-1">الاسم</label>
              <input value={fullName} onChange={(e) => setFullName(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" required />
            </div>
          )}
          <div>
            <label className="text-xs text-slate-500 block mb-1">البريد الإلكتروني</label>
            <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" required />
          </div>
          <div>
            <label className="text-xs text-slate-500 block mb-1">كلمة المرور</label>
            <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm" required minLength={6} />
          </div>
          {err && <div className="text-xs text-rose-600 bg-rose-50 border border-rose-200 rounded-lg p-2">{err}</div>}
          <button disabled={busy} type="submit" style={{ background: NAVY }} className="w-full text-white text-sm font-medium py-2.5 rounded-lg hover:opacity-90 transition disabled:opacity-50">
            {busy ? "جارٍ التنفيذ..." : mode === "signin" ? "تسجيل الدخول" : "إنشاء حساب"}
          </button>
        </form>
        <button
          onClick={() => { setMode(mode === "signin" ? "signup" : "signin"); setErr(""); }}
          className="text-xs text-blue-700 hover:underline mt-4 block text-center w-full"
        >
          {mode === "signin" ? "أول مرة تستخدم النظام؟ أنشئ حساب" : "عندك حساب بالفعل؟ سجّل دخول"}
        </button>
        <div className="text-[11px] text-slate-400 mt-4 text-center leading-relaxed">
          كل حساب جديد يبدأ بصلاحية "محاسب" افتراضيًا.<br/>لترقية حساب إلى "مدير" راجع دليل الإعداد.
        </div>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(undefined); // undefined = loading, null = logged out
  const [profile, setProfile] = useState(null);
  const [toast, setToast] = useState("");
  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2200); };

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session || null));
    const { data: sub } = sb.auth.onAuthStateChange((_evt, sess) => setSession(sess || null));
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) { setProfile(null); return; }
    let cancelled = false;
    sb.from("profiles").select("*").eq("id", session.user.id).single().then(({ data, error }) => {
      if (!cancelled && data) setProfile(data);
    });
    return () => { cancelled = true; };
  }, [session]);

  if (session === undefined) {
    return <div className="min-h-screen flex items-center justify-center text-slate-400 text-sm">جارٍ التحميل...</div>;
  }
  if (!session) return <LoginScreen />;
  if (!profile) {
    return <div className="min-h-screen flex items-center justify-center text-slate-400 text-sm">جارٍ تجهيز الحساب...</div>;
  }
  return (
    <React.Fragment>
      <MainApp profile={profile} flash={flash} />
      <Toast msg={toast} />
    </React.Fragment>
  );
}

    setClientContracts(p12.data || []);
    setPayments(p13.data || []);
    setTransactions(p14.data || []);
    setGovFees(p15.data || []);
    setOfficeExpenses(p16.data || []);
    setLoading(false);

  // مزامنة لحظية: أي تعديل من طرف تاني (محاسب/مدير) يوصل هنا تلقائي
  useEffect(() => {
    const ch = sb.channel("db-sync")
      .on("postgres_changes", { event: "*", schema: "public" }, (payload) => {
        loadAll();
      })
      .subscribe();
    return () => sb.removeChannel(ch);
  }, [loadAll]);

  // نسخة احتياطية تلقائية يومية: مرة واحدة يوميًا لكل جهاز، لمن يملك صلاحية تعديل فقط

    if (loading || !canEdit) return;
    (async () => {
      try {
        const auto = window.localStorage.getItem("qagc-auto-backup");
        if (auto === "off") return;
        const last = window.localStorage.getItem("qagc-last-backup");
        const today = new Date().toISOString().slice(0, 10);
        if (last && last.slice(0, 10) === today) return;
        const wb = buildFullBackupWorkbook({
          company, employees, projects, sheets, entries, residencies, custody, cars,
          lpos, contracts, clientContracts, payments, transactions, govFees, officeExpenses,

        {tab === "projects" && (
          <ProjectsView projects={projects} employees={employees} sheets={sheets} entries={entries}
            clientContracts={clientContracts} payments={payments} transactions={transactions}
            govFees={govFees} officeExpenses={officeExpenses}

        {monthSheets.map((s) => tab === "m" + s.id && (
          <SheetView key={s.id} sheet={s} entries={entries.filter((e) => e.sheet_id === s.id).sort((a, b) => (a.sort_order - b.sort_order) || (a.id - b.id))}

        )}

        {tab === "custody" && <CustodyView rows={custody} canEdit={canEdit} guard={guard} flash={flash} reload={loadAll} profile={profile} />}
        {tab === "cars" && <CarsView rows={cars} canEdit={canEdit} guard={guard} flash={flash} reload={loadAll} />}
        {tab === "govfees" && <GovFeesView rows={govFees} projects={projects} canEdit={canEdit} guard={guard} flash={flash} reload={loadAll} />}
        {tab === "office" && <OfficeExpensesView rows={officeExpenses} projects={projects} canEdit={canEdit} guard={guard} flash={flash} reload={loadAll} />}

          <ContractsView contracts={contracts.filter((x) => !x.archived)} company={company} projects={projects}

        )}
        {tab === "audit" && <AuditLogView />}
        {tab === "settings" && (
          <SettingsView company={company} employees={employees} projects={projects} sheets={sheets}
            canEdit={canEdit} guard={guard} flash={flash} reload={loadAll} profile={profile}

      {showAddMonth && <AddMonthModal onClose={() => setShowAddMonth(false)} employees={employees} onCreate={createMonth} />}
    </div>
  );
}

function Dashboard({ sheets, entries, projects, employees, residencies, custody, cars, payments, govFees, officeExpenses, clientContracts }) {
  const empByIdName = {};
  employees.forEach((e) => empByIdName[e.id] = e.name);

  const sheetTotals = sheets.map((s) => {
    const rows = entries.filter((e) => e.sheet_id === s.id);
    let gross = 0, adv = 0, ded = 0, net = 0, count = 0;
    rows.forEach((r) => {
      const c = calcEntry(r, s.days, projects);
      if (Number(r.salary) > 0 || r.name_override) count++;
      gross += c.gross; adv += c.adv; ded += c.ded; net += c.net;
    });
    return { ...s, gross, adv, ded, net, count };
  });

  const gt = sheetTotals.reduce((a, s) => ({ gross: a.gross + s.gross, adv: a.adv + s.adv, ded: a.ded + s.ded, net: a.net + s.net }), { gross: 0, adv: 0, ded: 0, net: 0 });
  const custodyTotal = custody.reduce((a, r) => a + (Number(r.amount) || 0), 0);

  const resStat = (list, dateField) => {
    let ok = 0, soon = 0, exp = 0;
    list.forEach((r) => {
      const st = resStatus(r[dateField]);
      if (st.label.includes("سارية")) ok++;
      else if (st.label.includes("تنتهي")) soon++;
      else if (st.label.includes("منتهية")) exp++;
    });
    return { ok, soon, exp };
  };
  const resSt = resStat(residencies, "expiry_date");
  const carSt = resStat(cars, "ins_expiry");

  const contractsTotal = (clientContracts || []).reduce((a, c) => a + Number(c.value || 0), 0);
  const collectedTotal = (payments || []).reduce((a, p) => a + Number(p.paid_amount || 0), 0);
  const dueTotal = (payments || []).reduce((a, p) => a + Number(p.amount || 0), 0);
  const govFeesTotal = (govFees || []).reduce((a, g) => a + Number(g.amount || 0), 0);
  const officeTotal = (officeExpenses || []).reduce((a, o) => a + Number(o.amount || 0), 0);

  return (
    <div>
      <div className="flex flex-wrap gap-3 mb-3">
        <StatCard label="صافي الرواتب (كل الشهور)" value={fmt0(gt.net) + " د.إ"} color="#1E4620" />
        <StatCard label="إجمالي المرتبات الأساسية" value={fmt0(gt.gross) + " د.إ"} />
        <StatCard label="إجمالي السلف" value={fmt0(gt.adv) + " د.إ"} color="#C0504D" />
        <StatCard label="إجمالي عهدة الموظفين" value={fmt0(custodyTotal) + " د.إ"} color="#0E7490" />
      </div>
      <div className="flex flex-wrap gap-3 mb-3">
        <StatCard label="إجمالي قيمة عقود العملاء" value={fmt0(contractsTotal) + " د.إ"} />
        <StatCard label="المحصّل من العملاء" value={fmt0(collectedTotal) + " د.إ"} color="#1E4620" />
        <StatCard label="مستحق غير محصّل" value={fmt0(dueTotal - collectedTotal) + " د.إ"} color="#C0504D" />
        <StatCard label="رسوم حكومية + مصروفات مكتب" value={fmt0(govFeesTotal + officeTotal) + " د.إ"} />
      </div>
      <div className="grid md:grid-cols-2 gap-4">
        <div className="bg-white rounded-xl border border-slate-200 p-4">
          <h3 className="font-bold text-sm mb-3" style={{ color: NAVY }}>الملخّص الشهري</h3>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-white" style={{ background: BLUE }}>
                {["البند", "العدد", "المرتبات", "السلف", "الخصومات", "الصافي"].map((h) => (
                  <th key={h} className="px-2 py-2 font-bold">{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sheetTotals.map((s) => (
                <tr key={s.id} className="border-b border-slate-100 text-center">
                  <td className="px-2 py-2 font-bold text-right" style={{ color: NAVY }}>{s.key}</td>
                  <td className="px-2 py-2">{s.count}</td>
                  <td className="px-2 py-2">{fmt0(s.gross)}</td>
                  <td className="px-2 py-2" style={{ color: "#C0504D" }}>{fmt0(s.adv)}</td>
                  <td className="px-2 py-2">{fmt0(s.ded)}</td>
                  <td className="px-2 py-2 font-bold" style={{ color: "#1E4620" }}>{fmt0(s.net)}</td>
                </tr>
              ))}
              <tr style={{ background: "#EAF3EA" }} className="text-center font-bold">
                <td className="px-2 py-2 text-right" style={{ color: "#1E4620" }}>الإجمالي</td>
                <td></td>
                <td className="px-2 py-2">{fmt0(gt.gross)}</td>
                <td className="px-2 py-2">{fmt0(gt.adv)}</td>
                <td className="px-2 py-2">{fmt0(gt.ded)}</td>
                <td className="px-2 py-2" style={{ color: "#1E4620" }}>{fmt0(gt.net)}</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div className="space-y-4">
          <div className="bg-white rounded-xl border border-slate-200 p-4">
            <div className="text-xs text-slate-500 mb-2">حالة الإقامات</div>
            <div className="flex gap-2 flex-wrap">
              <span className="text-xs font-bold px-2 py-1 rounded text-white" style={{ background: "#16A34A" }}>سارية {resSt.ok}</span>

              <span className="text-xs font-bold px-2 py-1 rounded text-white" style={{ background: "#E11D48" }}>منتهية {resSt.exp}</span>
            </div>
          </div>
          <div className="bg-white rounded-xl border border-slate-200 p-4">
            <div className="text-xs text-slate-500 mb-2">حالة تأمين السيارات</div>
            <div className="flex gap-2 flex-wrap">
              <span className="text-xs font-bold px-2 py-1 rounded text-white" style={{ background: "#16A34A" }}>سارية {carSt.ok}</span>
              <span className="text-xs font-bold px-2 py-1 rounded text-white" style={{ background: "#F59E0B" }}>تنتهي قريبًا {carSt.soon}</span>
              <span className="text-xs font-bold px-2 py-1 rounded text-white" style={{ background: "#E11D48" }}>منتهية {carSt.exp}</span>

            <div className="text-xs text-slate-500 mb-2">عدد المشاريع النشطة</div>
            <div className="text-lg font-bold" style={{ color: NAVY }}>{projects.filter((p) => p.active).length}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function makeMonthWS(sheet, rows, employees, projects) {
  const ws = {};
  const set = (r, c, v, opts) => {
    const addr = XLSX.utils.encode_cell({ r, c });
    ws[addr] = Object.assign({ v, t: typeof v === "number" ? "n" : "s" }, opts || {});
  };
  const headBg = { fill: { fgColor: { rgb: "1F3864" } }, font: { color: { rgb: "FFFFFF" }, bold: true, sz: 9, name: "Arial" }, alignment: { horizontal: "center", vertical: "center" } };
  set(0, 0, sheet.key + " — كشف الرواتب", { s: { font: { bold: true, sz: 13, name: "Arial" } } });
  const headers = ["م", "الاسم", "الراتب"].concat(Array.from({ length: sheet.days }, (_, i) => String(i + 1))).concat(["أوفر تايم", "سلف", "خصومات", "الصافي"]);
  headers.forEach((h, i) => set(1, i, h, { s: headBg }));
  rows.forEach((r, i) => {
    const emp = employees.find((e) => e.id === r.employee_id);
    const name = r.name_override || (emp ? emp.name : "");
    const salary = Number(r.salary) || 0;
    const calc = calcEntry(r, sheet.days, projects);
    set(2 + i, 0, i + 1); set(2 + i, 1, name); set(2 + i, 2, salary);
    (r.cells || []).forEach((v, di) => set(2 + i, 3 + di, v || ""));
    set(2 + i, 3 + sheet.days, r.ot_hours * r.ot_rate);
    set(2 + i, 4 + sheet.days, r.advances);
    set(2 + i, 5 + sheet.days, r.deductions);
    set(2 + i, 6 + sheet.days, Math.round(calc.net));
  });
  ws["!ref"] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: 1 + rows.length, c: 6 + sheet.days } });
  ws["!cols"] = [{ wch: 4 }, { wch: 20 }, { wch: 10 }].concat(Array.from({ length: sheet.days }, () => ({ wch: 6 }))).concat([{ wch: 10 }, { wch: 8 }, { wch: 10 }, { wch: 10 }]);
  ws["!views"] = [{ RTL: true }];
  return ws;
}

/* ---------------------------------------------------------------------- */
/* النسخ الاحتياطي: تصدير كل بيانات النظام في ملف Excel واحد متعدد الأوراق */
/* ---------------------------------------------------------------------- */
function makeSimpleWS(title, columns, rows) {
  const ws = {};
  const set = (r, c, v, opts) => {
    let val = v;
    if (val === null || val === undefined) val = "";
    if (typeof val === "boolean") val = val ? "نعم" : "لا";
    const t = typeof val === "number" ? "n" : "s";
    const addr = XLSX.utils.encode_cell({ r, c });
    ws[addr] = Object.assign({ v: val, t }, opts || {});
  };
  const headBg = { fill: { fgColor: { rgb: "1F3864" } }, font: { color: { rgb: "FFFFFF" }, bold: true, sz: 9, name: "Arial" }, alignment: { horizontal: "center", vertical: "center" } };
  set(0, 0, title, { s: { font: { bold: true, sz: 13, name: "Arial" } } });
  columns.forEach((col, i) => set(1, i, col.label, { s: headBg }));
  (rows || []).forEach((row, ri) => {
    columns.forEach((col, ci) => set(2 + ri, ci, col.resolve ? col.resolve(row) : row[col.key]));
  });
  const lastRow = 1 + (rows || []).length;
  const lastCol = Math.max(0, columns.length - 1);
  ws["!ref"] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: lastRow, c: lastCol } });
  ws["!cols"] = columns.map(() => ({ wch: 16 }));
  ws["!views"] = [{ RTL: true }];
  return ws;
}

function buildFullBackupWorkbook(all) {
  const wb = XLSX.utils.book_new();
  const add = (title, columns, rows) => {
    XLSX.utils.book_append_sheet(wb, makeSimpleWS(title, columns, rows || []), title.slice(0, 31));
  };
  const projects = all.projects || [];
  const payments = all.payments || [];
  const projName = (id) => { const p = projects.find((x) => x.id === id); return p ? p.name : ""; };
  const payTitle = (id) => { const p = payments.find((x) => x.id === id); return p ? p.title : ""; };

  if (all.company) {
    add("بيانات الشركة", [
      { key: "name", label: "الاسم" }, { key: "name_en", label: "الاسم EN" },
      { key: "phone", label: "الهاتف" }, { key: "email", label: "البريد" },

  }

  add("الموظفين", [

    { key: "ot_rate", label: "أجر الساعة الإضافي" }, { key: "active", label: "نشط" },
  ], all.employees);

  add("المشاريع", [
    { key: "project_no", label: "رقم" }, { key: "name", label: "اسم المشروع" },
    { key: "owner", label: "المالك" }, { key: "project_type", label: "النوع" },
    { key: "status", label: "الحالة" }, { key: "start_date", label: "تاريخ البدء" },
    { key: "budget_amount", label: "الميزانية التقديرية" },
  ], projects);

  (all.sheets || []).forEach((s) => {
    const rows = (all.entries || []).filter((e) => e.sheet_id === s.id);
    XLSX.utils.book_append_sheet(wb, makeMonthWS(s, rows, all.employees, projects), (s.key || "sheet").slice(0, 31));
  });

  add("الإقامات", [
    { key: "name", label: "اسم الموظف" }, { key: "nationality", label: "الجنسية" }, { key: "job", label: "الوظيفة" },
    { key: "res_no", label: "رقم الإقامة" }, { key: "pass_no", label: "رقم الجواز" },
    { key: "issue_date", label: "تاريخ الإصدار" }, { key: "expiry_date", label: "تاريخ الانتهاء" }, { key: "notes", label: "ملاحظات" },
  ], all.residencies);

  add("عهدة الموظفين", [
    { key: "name", label: "اسم الموظف" }, { key: "description", label: "البيان" }, { key: "amount", label: "المبلغ (د.إ)" },
    { key: "cdate", label: "تاريخ التحويل" }, { key: "method", label: "طريقة التحويل" }, { key: "notes", label: "ملاحظات" },
  ], all.custody);

  add("سيارات الشركة", [
    { key: "plate", label: "رقم اللوحة" }, { key: "emirate", label: "الإمارة" }, { key: "car_type", label: "نوع السيارة" },
    { key: "model", label: "الموديل" }, { key: "color", label: "اللون" }, { key: "driver", label: "السائق" },
    { key: "project", label: "المشروع" }, { key: "lic_start", label: "بداية الرخصة" }, { key: "lic_expiry", label: "انتهاء الرخصة" },
    { key: "insurer", label: "شركة التأمين" }, { key: "ins_expiry", label: "انتهاء التأمين" }, { key: "notes", label: "ملاحظات" },
  ], all.cars);

  add("الرسوم الحكومية", [
    { key: "project_id", label: "المشروع", resolve: (r) => projName(r.project_id) },
    { key: "description", label: "البيان" }, { key: "payer_type", label: "جهة الدفع" }, { key: "amount", label: "المبلغ (د.إ)" },
    { key: "paid_status", label: "حالة السداد" }, { key: "paid_date", label: "تاريخ السداد" },
    { key: "reimburse_status", label: "حالة الاسترداد" }, { key: "reimburse_date", label: "تاريخ الاسترداد" }, { key: "notes", label: "ملاحظات" },
  ], all.govFees);

  add("مصروفات المكتب", [
    { key: "edate", label: "التاريخ" }, { key: "category", label: "التصنيف" }, { key: "description", label: "البيان" },
    { key: "amount", label: "المبلغ (د.إ)" }, { key: "project_id", label: "مرتبط بمشروع", resolve: (r) => projName(r.project_id) },
    { key: "method", label: "طريقة الدفع" }, { key: "notes", label: "ملاحظات" },
  ], all.officeExpenses);

  add("أوامر الشراء", [
    { key: "number", label: "الرقم" }, { key: "ldate", label: "التاريخ" }, { key: "supplier", label: "المورد" },
    { key: "project", label: "المشروع" },
    { key: "total", label: "الإجمالي (شامل الضريبة)", resolve: (r) => {
        const items = r.items || []; const sub = items.reduce((a, it) => a + (Number(it.qty) || 0) * (Number(it.rate) || 0), 0);
        return Math.round(sub + sub * (Number(r.vat_rate) || 0) / 100);
      } },
    { key: "archived", label: "مؤرشف" },
  ], all.lpos);

  add("عقود المقاولين", [
    { key: "ref", label: "المرجع" }, { key: "cdate", label: "التاريخ" }, { key: "project", label: "المشروع" },
    { key: "client", label: "العميل" }, { key: "sub_name", label: "المقاول من الباطن" }, { key: "value", label: "القيمة (د.إ)" },
    { key: "duration_days", label: "المدة (يوم)" }, { key: "delivery_date", label: "تاريخ التسليم" }, { key: "archived", label: "مؤرشف" },
  ], all.contracts);

  add("عقود العملاء", [
    { key: "project_id", label: "المشروع", resolve: (r) => projName(r.project_id) },
    { key: "contract_no", label: "رقم العقد" }, { key: "cdate", label: "التاريخ" }, { key: "value", label: "القيمة (د.إ)" },
    { key: "vat_rate", label: "ضريبة %" }, { key: "payment_terms", label: "شروط الدفع" },
  ], all.clientContracts);

  add("دفعات المشاريع", [
    { key: "project_id", label: "المشروع", resolve: (r) => projName(r.project_id) },
    { key: "title", label: "البيان" }, { key: "amount", label: "المستحق (د.إ)" }, { key: "paid_amount", label: "المحصّل (د.إ)" },
    { key: "due_date", label: "تاريخ الاستحقاق" }, { key: "status", label: "الحالة" },
  ], payments);

  add("عمليات التحصيل", [
    { key: "payment_id", label: "الدفعة", resolve: (r) => payTitle(r.payment_id) },
    { key: "amount", label: "المبلغ (د.إ)" }, { key: "pdate", label: "التاريخ" }, { key: "method", label: "الطريقة" }, { key: "ref_no", label: "رقم مرجعي" },
  ], all.transactions);

  return wb;
}

function SheetView({ sheet, entries, employees, projects, canEdit, guard, flash, reload, allowAddMonth }) {
  const [showAddMonth, setShowAddMonth] = useState(false);
  const [pickerFor, setPickerFor] = useState(null); // { entryId, dayIndex, current }
  const activeEmployees = employees.filter((e) => e.active);
  const rows = entries;

  const patchEntry = async (id, patch) => {
    if (!guard()) return;
    const { error } = await sb.from("payroll_entries").update(patch).eq("id", id);
    if (error) flash("خطأ: " + error.message); else reload();
  };
  const patchEmployeeName = async (empId, name) => {
    if (!guard() || !empId) return;
    const { error } = await sb.from("employees").update({ name }).eq("id", empId);
    if (error) flash("خطأ: " + error.message); else reload();
  };
  const setCell = (entry, di, val) => {
    const cells = (entry.cells || []).slice();
    cells[di] = val;
    patchEntry(entry.id, { cells });
    setPickerFor(null);
  };

  const createMonth = async (key, days) => {
    if (!guard()) return;
    const { data: newSheet, error } = await sb.from("payroll_sheets").insert({ key, days, is_staff: false, sort_order: Math.floor(Date.now()/1000) }).select().single();
    if (error) { flash("خطأ: " + error.message); return; }
    const newRows = activeEmployees.map((e, i) => ({
      sheet_id: newSheet.id, employee_id: e.id, salary: e.salary || 0, cells: Array(days).fill(""), sort_order: i
    }));
    if (newRows.length) {
      const { error: e2 } = await sb.from("payroll_entries").insert(newRows);
      if (e2) flash("خطأ: " + e2.message);
    }
    setShowAddMonth(false); flash("تم إنشاء شهر " + key);
    reload();
  };

  const addEmployeeToSheet = async () => {
    if (!guard()) return;
    if (sheet.editable_names) {
      const { error } = await sb.from("payroll_entries").insert({ sheet_id: sheet.id, cells: Array(sheet.days).fill(""), salary: 0, sort_order: rows.length });
      if (error) { flash("خطأ: " + error.message); return; }
      reload(); return;
    }
    const { data: newEmp, error: e1 } = await sb.from("employees").insert({ name: "موظف جديد " + (rows.length + 1), salary: 0, ot_rate: 0, active: true, sort_order: employees.length }).select().single();
    if (e1) { flash("خطأ: " + e1.message); return; }
    const { error: e2 } = await sb.from("payroll_entries").insert({ sheet_id: sheet.id, employee_id: newEmp.id, salary: 0, cells: Array(sheet.days).fill(""), sort_order: rows.length });
    if (e2) { flash("خطأ: " + e2.message); return; }
    flash("تم إضافة موظف جديد — اكتب اسمه في الجدول");
    reload();
  };

  const delRow = async (id) => {
    if (!guard()) return;
    if (!confirm("حذف هذا الصف؟")) return;
    const { error } = await sb.from("payroll_entries").delete().eq("id", id);
    if (error) flash("خطأ: " + error.message); else reload();
  };

  const exportExcel = () => {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, makeMonthWS(sheet, rows, employees, projects), (sheet.key || "sheet").slice(0, 31));
    XLSX.writeFile(wb, sheet.key + ".xlsx");
  };

  const gtot = rows.reduce((a, r) => a + calcEntry(r, sheet.days, projects).net, 0);

  const inp = "w-full text-xs rounded border border-slate-200 px-1.5 py-1 focus:outline-none focus:ring-1 focus:ring-blue-400";
  const th = "px-1.5 py-2 text-[11px] font-bold text-white text-center whitespace-nowrap";

  return (
    <div>
      <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
        <div className="flex items-center gap-3 flex-wrap">
          <h2 className="text-lg font-bold" style={{ color: NAVY }}>{sheet.key}</h2>
          <span className="text-xs text-slate-500">{sheet.days} يوم • قيمة اليوم = المرتب ÷ {sheet.days}</span>
          <span className="text-xs px-2 py-1 rounded text-white" style={{ background: "#1E4620" }}>إجمالي الصافي: {fmt0(gtot)} د.إ</span>
        </div>
        <div className="flex gap-2">
          {allowAddMonth && canEdit && (
            <button onClick={() => setShowAddMonth(true)} style={{ background: "#16A34A" }} className="text-white text-xs px-3 py-1.5 rounded-md hover:opacity-90">➕ شهر جديد</button>
          )}
          {canEdit && <button onClick={addEmployeeToSheet} style={{ background: "#16A34A" }} className="text-white text-xs px-3 py-1.5 rounded-md hover:opacity-90">➕ إضافة موظف</button>}
          <button onClick={exportExcel} style={{ background: "#0E7490" }} className="text-white text-xs px-3 py-1.5 rounded-md hover:opacity-90">⬇ Excel</button>
        </div>
      </div>

      <div className="flex flex-wrap gap-2 mb-3 bg-white rounded-lg p-2 border border-slate-200">
        {projects.map((p, i) => <Chip key={p.id} color={p.color || BLUE}>{i + 1}. {p.name}</Chip>)}
        <Chip color={STATUS_COLORS["غياب"]}>غ = غياب</Chip>
        <Chip color={STATUS_COLORS["مرضي"]}>م = مرضي</Chip>
        <Chip color={STATUS_COLORS["إجازة"]}>إ = إجازة</Chip>
        <Chip color="#94a3b8">· = جمعة/سبت</Chip>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 overflow-x-auto">
        <table className="border-collapse text-xs">
          <thead>
            <tr>
              <th className={th + " sticky right-0 z-20"} style={{ background: NAVY, minWidth: "150px" }}>الموظف</th>
              {Array.from({ length: sheet.days }, (_, i) => (
                <th key={i} className={th} style={{ background: BLUE, minWidth: "30px" }}>{i + 1}</th>
              ))}
              <th className={th} style={{ background: NAVY }}>أيام<br/>العمل</th>
              <th className={th} style={{ background: NAVY }}>غياب</th>
              <th className={th} style={{ background: NAVY }}>مرضي/<br/>إجازة</th>
              <th className={th} style={{ background: "#5B6B8C", minWidth: "70px" }}>أوفر<br/>(ساعة)</th>
              <th className={th} style={{ background: "#5B6B8C", minWidth: "70px" }}>سعر<br/>الساعة</th>
              <th className={th} style={{ background: "#5B6B8C", minWidth: "85px" }}>المرتب</th>
              <th className={th} style={{ background: NAVY, minWidth: "70px" }}>بدل<br/>أوفر</th>
              <th className={th} style={{ background: "#5B6B8C", minWidth: "70px" }}>سلف</th>
              <th className={th} style={{ background: "#5B6B8C", minWidth: "70px" }}>خصم</th>
              <th className={th} style={{ background: "#1E4620", minWidth: "90px" }}>إجمالي<br/>المرتب</th>
              {sheet.show_notes && <th className={th} style={{ background: "#5B6B8C", minWidth: "220px" }}>ملاحظات</th>}
              <th className={th} style={{ background: "#64748B", width: "40px" }}>حذف</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => {
              const emp = employees.find((e) => e.id === r.employee_id);
              const calc = calcEntry(r, sheet.days, projects);
              return (
                <tr key={r.id} className="hover:bg-slate-50">
                  <td className="sticky right-0 z-10 px-1 py-1 border-b border-l border-slate-200" style={{ background: LIGHT, color: NAVY, minWidth: "150px" }}>
                    {sheet.editable_names ? (
                      <input disabled={!canEdit} className="w-full text-xs font-bold rounded border border-green-300 bg-green-50 px-2 py-1" defaultValue={r.name_override || ""} placeholder={"اسم الموظف " + (i + 1)} onBlur={(e) => patchEntry(r.id, { name_override: e.target.value })} />
                    ) : (
                      <input disabled={!canEdit} className="w-full text-xs font-bold rounded border border-green-300 bg-green-50 px-2 py-1" defaultValue={emp ? emp.name : ""} placeholder={"اسم الموظف " + (i + 1)} onBlur={(e) => patchEmployeeName(r.employee_id, e.target.value)} />
                    )}
                  </td>
                  {Array.from({ length: sheet.days }, (_, di) => {
                    const v = (r.cells || [])[di] || "";
                    const st = cellStyle(projects, v);
                    return (
                      <td key={di}
                        onClick={() => canEdit && setPickerFor({ entryId: r.id, entry: r, dayIndex: di, current: v })}
                        title={v || "—"}
                        className="border border-slate-100 text-center cursor-pointer hover:ring-2 hover:ring-blue-400 hover:ring-inset"
                        style={{ background: st.bg, color: st.fg, minWidth: "30px", height: "26px", fontSize: "10px", padding: "1px" }}>
                        {cellShort(v, projects)}
                      </td>
                    );
                  })}
                  <td className="border-b border-slate-200 text-center font-semibold">{calc.working}</td>
                  <td className="border-b border-slate-200 text-center" style={{ color: calc.absence ? "#e11d48" : "#94a3b8" }}>{calc.absence || "-"}</td>
                  <td className="border-b border-slate-200 text-center" style={{ color: calc.sick ? "#a855f7" : "#94a3b8" }}>{calc.sick || "-"}</td>
                  <td className="border-b border-slate-200 px-1" style={{ minWidth: "70px" }}><input disabled={!canEdit} type="number" defaultValue={r.ot_hours || 0} onBlur={(e) => patchEntry(r.id, { ot_hours: toNum(e.target.value) })} className={inp + " text-center"} /></td>
                  <td className="border-b border-slate-200 px-1" style={{ minWidth: "70px" }}><input disabled={!canEdit} type="number" defaultValue={r.ot_rate || 0} onBlur={(e) => patchEntry(r.id, { ot_rate: toNum(e.target.value) })} className={inp + " text-center"} /></td>
                  <td className="border-b border-slate-200 px-1" style={{ minWidth: "85px" }}><input disabled={!canEdit} type="number" defaultValue={r.salary || 0} onBlur={(e) => patchEntry(r.id, { salary: toNum(e.target.value) })} className={inp + " text-center"} style={{ minWidth: "70px" }} /></td>
                  <td className="border-b border-slate-200 text-center text-slate-600" style={{ minWidth: "70px" }}>{calc.otAllow ? fmt0(calc.otAllow) : "-"}</td>
                  <td className="border-b border-slate-200 px-1" style={{ minWidth: "70px" }}><input disabled={!canEdit} type="number" defaultValue={r.advances || 0} onBlur={(e) => patchEntry(r.id, { advances: toNum(e.target.value) })} className={inp + " text-center"} /></td>
                  <td className="border-b border-slate-200 px-1" style={{ minWidth: "70px" }}><input disabled={!canEdit} type="number" defaultValue={r.deductions || 0} onBlur={(e) => patchEntry(r.id, { deductions: toNum(e.target.value) })} className={inp + " text-center"} /></td>
                  <td className="border-b border-slate-200 text-center font-bold" style={{ background: "#EAF3EA", color: "#1E4620", minWidth: "90px" }}>{fmt0(calc.net)}</td>
                  {sheet.show_notes && <td className="border-b border-slate-200 px-1" style={{ minWidth: "220px" }}>
                    <textarea disabled={!canEdit} defaultValue={r.notes || ""} onBlur={(e) => patchEntry(r.id, { notes: e.target.value })}
                      className={inp} rows={1}
                      style={{ resize: "both", minWidth: "200px", minHeight: "28px", maxWidth: "500px", overflow: "auto", lineHeight: "1.4" }} />
                  </td>}
                  <td className="border-b border-slate-200 text-center">
                    {canEdit && <button onClick={() => delRow(r.id)} className="text-slate-400 hover:text-red-600 transition" title="حذف الصف">🗑</button>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <p className="text-xs text-slate-500 mt-2">اضغط على أي خانة يوم لاختيار المشروع أو الحالة.</p>
      {showAddMonth && <AddMonthModal onClose={() => setShowAddMonth(false)} employees={employees} onCreate={createMonth} />}
      {pickerFor && (
        <Palette projects={projects} current={pickerFor.current}
          onPick={(v) => setCell(pickerFor.entry, pickerFor.dayIndex, v)}
          onClose={() => setPickerFor(null)} />
      )}
    </div>
  );
}

/* جدول عام قابل لإعادة الاستخدام: الإقامات / العهدة / السيارات */

function EditableTable({ table, rows, columns, canEdit, canModify, lockedMsg, guard, flash, reload, title, newRow, totalColumn, statusColumns }) {
  const canMod = canModify === undefined ? canEdit : canModify;
  const add = async () => {
    if (!guard()) return;
    const { error } = await sb.from(table).insert(Object.assign({}, newRow, { sort_order: rows.length }));
    if (error) flash("خطأ: " + error.message); else reload();
  };
  const patch = async (id, field, value) => {
    if (!canMod) { flash(lockedMsg || "ماعندكش صلاحية تعديل هذا العنصر"); return; }
    if (!guard()) return;
    const { error } = await sb.from(table).update({ [field]: value }).eq("id", id);
    if (error) flash("خطأ: " + error.message); else reload();
  };
  const del = async (id) => {
    if (!canMod) { flash(lockedMsg || "ماعندكش صلاحية حذف هذا العنصر"); return; }
    if (!guard()) return;
    if (!confirm("حذف هذا الصف؟")) return;
    const { error } = await sb.from(table).delete().eq("id", id);
    if (error) flash("خطأ: " + error.message); else reload();
  };

  const inp = "w-full text-xs rounded border border-slate-200 px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-400";
  const th = "px-2 py-2 text-xs font-bold text-white text-center whitespace-nowrap";
  const total = totalColumn ? rows.reduce((a, r) => a + (Number(r[totalColumn]) || 0), 0) : null;

  return (
    <div>
      <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
        <div className="flex items-center gap-3 flex-wrap">
          <h2 className="text-lg font-bold" style={{ color: NAVY }}>{title}</h2>
          {total !== null && <span className="text-xs px-2 py-1 rounded text-white" style={{ background: "#1E4620" }}>الإجمالي: {fmt0(total)} د.إ</span>}
        </div>
        {canEdit && <button onClick={add} style={{ background: "#16A34A" }} className="text-white text-xs px-3 py-1.5 rounded-md hover:opacity-90">➕ إضافة</button>}
      </div>
      {!canMod && canEdit && lockedMsg && (
        <p className="text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg p-2 mb-3">🔒 {lockedMsg}</p>
      )}
      <div className="bg-white rounded-xl border border-slate-200 overflow-x-auto">
        <table className="border-collapse text-xs w-full">
          <thead>
            <tr>
              <th className={th} style={{ background: NAVY, width: "36px" }}>#</th>
              {columns.map((c) => <th key={c.key} className={th} style={{ background: NAVY, minWidth: (c.width || "130") + "px" }}>{c.label}</th>)}
              {(statusColumns || []).map((sc) => <th key={sc.key} className={th} style={{ background: "#64748B", minWidth: "150px" }}>{sc.label}</th>)}
              <th className={th} style={{ background: "#64748B", width: "40px" }}>حذف</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={r.id} className="hover:bg-slate-50">
                <td className="border-b border-slate-100 text-center font-bold" style={{ color: NAVY }}>{i + 1}</td>
                {columns.map((c) => (
                  <td key={c.key} className="border-b border-slate-100 px-1 py-1">
                    {c.type === "select" ? (
                      <select disabled={!canMod} defaultValue={r[c.key] != null ? String(r[c.key]) : ""} onChange={(e) => patch(r.id, c.key, c.isRef ? (e.target.value ? Number(e.target.value) : null) : e.target.value)} className={inp}>
                        {c.options.map((o) => {
                          const val = (o && typeof o === "object") ? o.value : o;
                          const label = (o && typeof o === "object") ? o.label : o;
                          return <option key={val} value={val}>{label}</option>;
                        })}
                      </select>
                    ) : (
                      <input disabled={!canMod} type={c.type || "text"} defaultValue={r[c.key] || (c.type === "number" ? 0 : "")}
                        onBlur={(e) => patch(r.id, c.key, c.type === "number" ? (Number(e.target.value) || 0) : e.target.value)}
                        className={inp + (c.type === "number" ? " text-center" : "")} />
                    )}
                  </td>
                ))}
                {(statusColumns || []).map((sc) => {
                  const st = resStatus(r[sc.key]);
                  return (
                    <td key={sc.key} className="border-b border-slate-100 text-center px-1">
                      <span className="inline-block text-xs font-bold px-2 py-1 rounded" style={{ background: st.bg, color: st.color }}>{st.label}</span>
                    </td>
                  );
                })}
                <td className="border-b border-slate-100 text-center">
                  {canMod ? <button onClick={() => del(r.id)} className="text-slate-400 hover:text-red-600 transition" title="حذف">🗑</button> : <span className="text-slate-300" title="مقفول">🔒</span>}
                </td>
              </tr>
            ))}
          </tbody>
          {total !== null && (
            <tfoot>
              <tr style={{ background: "#EAF3EA" }} className="font-bold">
                <td colSpan={columns.findIndex((c) => c.key === totalColumn) + 2} className="px-2 py-2 text-left" style={{ color: "#1E4620" }}>الإجمالي</td>
                <td className="px-2 py-2 text-center" style={{ color: "#1E4620" }}>{fmt0(total)}</td>
                <td colSpan={columns.length - columns.findIndex((c) => c.key === totalColumn)}></td>
              </tr>
            </tfoot>
          )}
        </table>
      </div>
    </div>
  );
}

function CustodyView({ rows, canEdit, guard, flash, reload, profile }) {
  const [filterName, setFilterName] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const isOwner = profile && profile.role === "owner";

  const names = Array.from(new Set(rows.map((r) => (r.name || "").trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b, "ar"));

  const totalsByName = {};
  rows.forEach((r) => {
    const n = (r.name || "غير محدد").trim() || "غير محدد";
    if (!totalsByName[n]) totalsByName[n] = { total: 0, count: 0 };

/* ---------------------------------------------------------------------- */
/* تحويل الأرقام إلى كلمات (للمبلغ في المستندات) */
/* ---------------------------------------------------------------------- */
function numToWordsEn(num) {
  num = Math.floor(Math.abs(Number(num) || 0));
  if (num === 0) return "ZERO";
  var ones = ["", "ONE", "TWO", "THREE", "FOUR", "FIVE", "SIX", "SEVEN", "EIGHT", "NINE", "TEN", "ELEVEN", "TWELVE", "THIRTEEN", "FOURTEEN", "FIFTEEN", "SIXTEEN", "SEVENTEEN", "EIGHTEEN", "NINETEEN"];
  var tens = ["", "", "TWENTY", "THIRTY", "FORTY", "FIFTY", "SIXTY", "SEVENTY", "EIGHTY", "NINETY"];
  function b(n) {
    var s2 = "";
    if (n >= 100) { s2 += ones[Math.floor(n / 100)] + " HUNDRED"; n %= 100; if (n) s2 += " "; }
    if (n >= 20) { s2 += tens[Math.floor(n / 10)]; n %= 10; if (n) s2 += "-" + ones[n]; }
    else if (n > 0) { s2 += ones[n]; }
    return s2;
  }
  var scales = ["", "THOUSAND", "MILLION", "BILLION"];
  function conv(n) {
    if (n < 1000) return b(n);
    for (var i = 3; i >= 1; i--) {
      var base = Math.pow(1000, i);
      if (n >= base) return conv(Math.floor(n / base)) + " " + scales[i] + (n % base ? " " + conv(n % base) : "");
    }
  }
  return conv(num).trim();
}
function numToWordsAr(num) {
  num = Math.floor(Math.abs(Number(num) || 0));
  if (num === 0) return "صفر";
  var ones = ["", "واحد", "اثنان", "ثلاثة", "أربعة", "خمسة", "ستة", "سبعة", "ثمانية", "تسعة", "عشرة", "أحد عشر", "اثنا عشر", "ثلاثة عشر", "أربعة عشر", "خمسة عشر", "ستة عشر", "سبعة عشر", "ثمانية عشر", "تسعة عشر"];
  var tens = ["", "", "عشرون", "ثلاثون", "أربعون", "خمسون", "ستون", "سبعون", "ثمانون", "تسعون"];
  var hund = ["", "مئة", "مئتان", "ثلاثمئة", "أربعمئة", "خمسمئة", "ستمئة", "سبعمئة", "ثمانمئة", "تسعمئة"];
  function b(n) {
    var p = [];
    if (n >= 100) { p.push(hund[Math.floor(n / 100)]); n %= 100; }
    if (n >= 20) { var o = n % 10; if (o) p.push(ones[o] + " و" + tens[Math.floor(n / 10)]); else p.push(tens[Math.floor(n / 10)]); }
    else if (n > 0) { p.push(ones[n]); }
    return p.join(" و");
  }
  function conv(n) {
    if (n < 1000) return b(n);
    var sc = ["", "ألف", "مليون", "مليار"];
    for (var i = 3; i >= 1; i--) {
      var base = Math.pow(1000, i);
      if (n >= base) {
        var q = Math.floor(n / base), rem = n % base;
        var head = q === 1 ? sc[i] : q === 2 ? sc[i] + "ان" : conv(q) + " " + sc[i];
        return head + (rem ? " و" + conv(rem) : "");
      }
    }
  }
  return conv(num);
}

function LpoView({ lpos, company, projects, counters, canEdit, guard, flash, reload }) {
  const [sel, setSel] = useState(lpos.length ? lpos[0].id : null);
  const [draft, setDraft] = useState(null);
  const current = draft || lpos.find((l) => l.id === sel) || null;

  useEffect(() => { setDraft(null); }, [sel]);

  const newOne = async () => {
    if (!guard()) return;
    const { data: c } = await sb.from("counters").select("*").eq("name", "lpo").single();
    const nextNum = c ? c.value : 602;
    const obj = Object.assign(newLpoObj(), { number: String(nextNum), ldate: new Date().toISOString().slice(0, 10) });
    const { data, error } = await sb.from("lpos").insert(obj).select().single();
    if (error) { flash("خطأ: " + error.message); return; }
    await sb.from("counters").update({ value: nextNum + 1 }).eq("name", "lpo");
    reload(); setSel(data.id); flash("تم إنشاء أمر شراء جديد");
  };

  const save = async () => {
    if (!guard() || !current) return;
    const { id, ...patch } = current;
    const { error } = await sb.from("lpos").update(patch).eq("id", id);
    if (error) flash("خطأ: " + error.message); else { flash("تم الحفظ"); setDraft(null); reload(); }
  };
  const archiveIt = async () => {
    if (!guard() || !current) return;
    await sb.from("lpos").update({ archived: true, archived_at: new Date().toISOString() }).eq("id", current.id);
    setSel(null); reload(); flash("تم نقل الأمر للأرشيف");
  };
  const setF = (field, val) => setDraft(Object.assign({}, current, { [field]: val }));
  const setItem = (i, field, val) => {
    const items = (current.items || []).slice();
    items[i] = Object.assign({}, items[i], { [field]: val });
    setF("items", items);
  };
  const addItem = () => setF("items", (current.items || []).concat([{ desc: "", qty: 0, rate: 0 }]));
  const delItem = (i) => setF("items", (current.items || []).filter((_, idx) => idx !== i));

  const fld = "w-full text-xs rounded border border-slate-200 px-2 py-1.5";

  return (
    <div className="grid md:grid-cols-3 gap-4">
      <div className="md:col-span-1 no-print">

function LpoField({ label, val, onCh, type, list, disabled }) {
  return (
    <div>
      <div className="text-[10px] text-slate-500 mb-0.5">{label}</div>
      <input disabled={disabled} list={list} type={type || "text"} value={val || ""} onChange={(e) => onCh(e.target.value)}
        className="w-full border border-slate-300 rounded px-2 py-1.5 text-xs bg-white" />
    </div>
  );
}

/* ---------------------------------------------------------------------- */
/* العقود مع المقاولين من الباطن */
/* ---------------------------------------------------------------------- */
function newContractObj(company) {
  return {
    ref: "", cdate: "", scope_title_en: "", scope_title_ar: "", project: "", location: "",
    client: "", main_contractor: company ? company.name_en : "", sub_name: "", sub_license: "", sub_contact: "",
    value: 0, vat_rate: 5, advance_pct: "", on_delivery_pct: "", retention_pct: "",
    duration_days: "", delivery_date: "", warranty_months: "12", penalty: "",
    items: [{ desc: "", qty: 0, unit: "No.", rate: 0 }],
    main_sign_name: "", sub_sign_name: "", notes: ""
  };
}

function ContractPrint({ c, company }) {
  const items = c.items || [];
  const sub = items.reduce((a, it) => a + (Number(it.qty) || 0) * (Number(it.rate) || 0), 0);
  const vat = sub * (Number(c.vat_rate) || 0) / 100;
  const total = c.value || (sub + vat);
  return (
    <div id="print-area" style={{ background: "#fff", padding: "14mm", fontFamily: "Arial", fontSize: "12px", color: "#111" }}>
      <div style={{ textAlign: "center", borderBottom: "3px solid " + NAVY, paddingBottom: "10px", marginBottom: "14px" }}>
        <img src={LOGO} alt="" style={{ height: "44px", margin: "0 auto 6px" }} />
        <div style={{ fontSize: "16px", fontWeight: "bold", color: NAVY }}>{company ? company.name_en : ""}</div>
        <div style={{ fontSize: "16px", fontWeight: "bold", marginTop: "6px" }}>SUBCONTRACT AGREEMENT</div>
        <div style={{ fontSize: "11px" }}>Ref: {c.ref} &nbsp; Date: {c.cdate}</div>
      </div>
      <div style={{ fontSize: "12px", marginBottom: "10px" }}>
        <div><b>Scope:</b> {c.scope_title_en} {c.scope_title_ar ? "— " + c.scope_title_ar : ""}</div>
        <div><b>Project:</b> {c.project} &nbsp; <b>Location:</b> {c.location} &nbsp; <b>Client:</b> {c.client}</div>
        <div><b>Main Contractor:</b> {c.main_contractor}</div>
        <div><b>Subcontractor:</b> {c.sub_name} &nbsp; <b>License:</b> {c.sub_license} &nbsp; <b>Contact:</b> {c.sub_contact}</div>
      </div>
      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "11px" }}>
        <thead>
          <tr style={{ background: NAVY, color: "#fff" }}>
            <th style={{ border: "1px solid #ccc", padding: "5px" }}>#</th>
            <th style={{ border: "1px solid #ccc", padding: "5px" }}>Description</th>
            <th style={{ border: "1px solid #ccc", padding: "5px" }}>Qty</th>
            <th style={{ border: "1px solid #ccc", padding: "5px" }}>Unit</th>
            <th style={{ border: "1px solid #ccc", padding: "5px" }}>Rate</th>
            <th style={{ border: "1px solid #ccc", padding: "5px" }}>Amount</th>
          </tr>
        </thead>
        <tbody>
          {items.map((it, i) => (
            <tr key={i}>
              <td style={{ border: "1px solid #ccc", padding: "5px", textAlign: "center" }}>{i + 1}</td>
              <td style={{ border: "1px solid #ccc", padding: "5px" }}>{it.desc}</td>
              <td style={{ border: "1px solid #ccc", padding: "5px", textAlign: "center" }}>{it.qty}</td>
              <td style={{ border: "1px solid #ccc", padding: "5px", textAlign: "center" }}>{it.unit}</td>
              <td style={{ border: "1px solid #ccc", padding: "5px", textAlign: "center" }}>{fmt2(it.rate)}</td>
              <td style={{ border: "1px solid #ccc", padding: "5px", textAlign: "center" }}>{fmt2((Number(it.qty) || 0) * (Number(it.rate) || 0))}</td>
            </tr>
          ))}
        </tbody>
      </table>
      <div style={{ fontSize: "12px", marginTop: "10px" }}>
        <b>Contract Value:</b> {fmt2(total)} AED ({numToWordsEn(total)} DIRHAMS ONLY)<br/>
        <b>Payment Terms:</b> Advance {c.advance_pct || 0}% — On Delivery {c.on_delivery_pct || 0}% — Retention {c.retention_pct || 0}%<br/>
        <b>Duration:</b> {c.duration_days} days &nbsp; <b>Delivery Date:</b> {c.delivery_date}<br/>
        <b>Warranty:</b> {c.warranty_months} months &nbsp; <b>Penalty:</b> {c.penalty}
      </div>
      {c.notes && <div style={{ fontSize: "11px", marginTop: "8px" }}><b>Notes:</b> {c.notes}</div>}
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: "50px", fontSize: "12px" }}>
        <div>Main Contractor: {c.main_sign_name}<br/>______________</div>
        <div>Subcontractor: {c.sub_sign_name}<br/>______________</div>
      </div>
    </div>
  );
}

function ContractsView({ contracts, company, projects, counters, canEdit, guard, flash, reload }) {
  const [sel, setSel] = useState(contracts.length ? contracts[0].id : null);
  const [draft, setDraft] = useState(null);
  const current = draft || contracts.find((c) => c.id === sel) || null;
  useEffect(() => { setDraft(null); }, [sel]);

  const newOne = async () => {
    if (!guard()) return;
    const { data: cRow } = await sb.from("counters").select("*").eq("name", "contract").single();
    const nextNum = cRow ? cRow.value : 3272;
    const obj = Object.assign(newContractObj(company), { ref: "QAGC-CON/" + new Date().getFullYear() + "/" + nextNum, cdate: new Date().toISOString().slice(0, 10) });
    const { data, error } = await sb.from("contracts").insert(obj).select().single();
    if (error) { flash("خطأ: " + error.message); return; }
    await sb.from("counters").update({ value: nextNum + 1 }).eq("name", "contract");
    reload(); setSel(data.id); flash("تم إنشاء عقد جديد");
  };
  const save = async () => {
    if (!guard() || !current) return;
    const { id, ...patch } = current;
    const { error } = await sb.from("contracts").update(patch).eq("id", id);
    if (error) flash("خطأ: " + error.message); else { flash("تم الحفظ"); setDraft(null); reload(); }
  };
  const archiveIt = async () => {
    if (!guard() || !current) return;
    await sb.from("contracts").update({ archived: true, archived_at: new Date().toISOString() }).eq("id", current.id);
    setSel(null); reload(); flash("تم نقل العقد للأرشيف");
  };
  const setF = (field, val) => setDraft(Object.assign({}, current, { [field]: val }));
  const setItem = (i, field, val) => {
    const items = (current.items || []).slice();
    items[i] = Object.assign({}, items[i], { [field]: val });
    setF("items", items);
  };
  const addItem = () => setF("items", (current.items || []).concat([{ desc: "", qty: 0, unit: "No.", rate: 0 }]));
  const delItem = (i) => setF("items", (current.items || []).filter((_, idx) => idx !== i));
  const fld = "w-full text-xs rounded border border-slate-200 px-2 py-1.5";

  return (
    <div className="grid md:grid-cols-3 gap-4">
      <div className="md:col-span-1 no-print">

          <h2 className="text-base font-bold" style={{ color: NAVY }}>العقود</h2>

        </div>
        <div className="bg-white rounded-xl border border-slate-200 divide-y max-h-[70vh] overflow-y-auto">
          {contracts.map((c) => (
            <button key={c.id} onClick={() => setSel(c.id)} className={"w-full text-right px-3 py-2 text-xs hover:bg-slate-50 " + (sel === c.id ? "bg-blue-50" : "")}>
              <div className="font-bold" style={{ color: NAVY }}>{c.ref}</div>
              <div className="text-slate-400">{c.sub_name || "بدون مقاول باطن"}</div>
            </button>
          ))}
          {!contracts.length && <div className="text-xs text-slate-400 p-3">لا يوجد عقود بعد</div>}
        </div>
      </div>
      <div className="md:col-span-2">
        {current ? (
          <div>
            <div className="bg-white rounded-xl border border-slate-200 p-4 mb-3 no-print">
              <div className="grid grid-cols-2 gap-3 mb-3">
                <LpoField label="مرجع العقد" val={current.ref} onCh={(v) => setF("ref", v)} disabled={!canEdit} />
                <LpoField label="التاريخ" val={current.cdate} onCh={(v) => setF("cdate", v)} type="date" disabled={!canEdit} />
                <LpoField label="وصف الأعمال (En)" val={current.scope_title_en} onCh={(v) => setF("scope_title_en", v)} disabled={!canEdit} />
                <LpoField label="وصف الأعمال (Ar)" val={current.scope_title_ar} onCh={(v) => setF("scope_title_ar", v)} disabled={!canEdit} />
                <LpoField label="المشروع" val={current.project} onCh={(v) => setF("project", v)} list="proj-list2" disabled={!canEdit} />
                <LpoField label="الموقع" val={current.location} onCh={(v) => setF("location", v)} disabled={!canEdit} />
                <LpoField label="العميل" val={current.client} onCh={(v) => setF("client", v)} disabled={!canEdit} />

              {(current.items || []).map((it, i) => (
                <div key={i} className="grid grid-cols-12 gap-1 mb-1 items-center">
                  <input disabled={!canEdit} className={fld + " col-span-5"} placeholder="الوصف" value={it.desc} onChange={(e) => setItem(i, "desc", e.target.value)} />
                  <input disabled={!canEdit} className={fld + " col-span-2"} type="number" placeholder="كمية" value={it.qty} onChange={(e) => setItem(i, "qty", Number(e.target.value) || 0)} />
                  <input disabled={!canEdit} className={fld + " col-span-2"} placeholder="وحدة" value={it.unit} onChange={(e) => setItem(i, "unit", e.target.value)} />
                  <input disabled={!canEdit} className={fld + " col-span-2"} type="number" placeholder="سعر" value={it.rate} onChange={(e) => setItem(i, "rate", Number(e.target.value) || 0)} />
                  {canEdit && <button onClick={() => delItem(i)} className="col-span-1 text-slate-400 hover:text-red-600">🗑</button>}

/* ---------------------------------------------------------------------- */
/* الأرشيف */
/* ---------------------------------------------------------------------- */
function ArchiveView({ lpos, contracts, canEdit, guard, flash, reload, profile }) {
  const [q, setQ] = useState("");
  const isOwner = profile && profile.role === "owner";
  const restore = async (table, id) => {
    if (!guard()) return;
    await sb.from(table).update({ archived: false }).eq("id", id);
    reload(); flash("تم الاسترجاع");
  };
  const canDelete = (item) => {
    if (!item.archived_at) return true; // عناصر قديمة قبل تفعيل هذه الميزة
    const ageMs = Date.now() - new Date(item.archived_at).getTime();
    return ageMs < 24 * 60 * 60 * 1000;
  };
  const del = async (table, item) => {
    if (!guard()) return;
    if (!canDelete(item)) { flash("هذا العنصر مقفول ولا يمكن حذفه بعد مرور 24 ساعة على الأرشفة"); return; }
    if (!isOwner) { flash("حذف عناصر الأرشيف متاح للمالك (Owner) فقط"); return; }
    if (!confirm("حذف نهائي؟ لا يمكن التراجع")) return;
    await sb.from(table).delete().eq("id", item.id);
    reload();
  };
  const ql = q.trim().toLowerCase();
  const fl = lpos.filter((l) => !ql || (l.number + l.supplier).toLowerCase().includes(ql));
  const fc = contracts.filter((c) => !ql || (c.ref + c.sub_name).toLowerCase().includes(ql));
  return (
    <div>
      <h2 className="text-lg font-bold mb-3" style={{ color: NAVY }}>الأرشيف</h2>
      <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="بحث..." className="w-full max-w-sm border border-slate-300 rounded-lg px-3 py-2 text-sm mb-2" />
      <p className="text-[11px] text-slate-400 mb-4">الحذف النهائي متاح للمالك فقط، وخلال أول 24 ساعة من الأرشفة — بعدها يُقفل العنصر تلقائيًا ولا يمكن حذفه من أي حد.</p>
      <div className="grid md:grid-cols-2 gap-4">
        <div className="bg-white rounded-xl border border-slate-200 p-4">
          <h3 className="font-bold text-sm mb-2" style={{ color: NAVY }}>أوامر شراء مؤرشفة ({fl.length})</h3>
          <div className="divide-y">
            {fl.map((l) => (
              <div key={l.id} className="flex justify-between items-center py-2 text-xs">
                <div><b>#{l.number}</b> — {l.supplier}</div>
                {canEdit && <div className="flex gap-2 items-center">
                  <button onClick={() => restore("lpos", l.id)} className="text-blue-700 hover:underline">استرجاع</button>
                  {canDelete(l) ? (
                    isOwner && <button onClick={() => del("lpos", l)} className="text-red-600 hover:underline">حذف نهائي</button>
                  ) : (
                    <span className="text-slate-400" title="مقفول بعد 24 ساعة">🔒</span>
                  )}
                </div>}
              </div>
            ))}
            {!fl.length && <div className="text-xs text-slate-400">لا يوجد</div>}
          </div>
        </div>
        <div className="bg-white rounded-xl border border-slate-200 p-4">
          <h3 className="font-bold text-sm mb-2" style={{ color: NAVY }}>عقود مؤرشفة ({fc.length})</h3>
          <div className="divide-y">
            {fc.map((c) => (
              <div key={c.id} className="flex justify-between items-center py-2 text-xs">
                <div><b>{c.ref}</b> — {c.sub_name}</div>
                {canEdit && <div className="flex gap-2 items-center">
                  <button onClick={() => restore("contracts", c.id)} className="text-blue-700 hover:underline">استرجاع</button>
                  {canDelete(c) ? (
                    isOwner && <button onClick={() => del("contracts", c)} className="text-red-600 hover:underline">حذف نهائي</button>
                  ) : (
                    <span className="text-slate-400" title="مقفول بعد 24 ساعة">🔒</span>
                  )}
                </div>}
              </div>
            ))}
            {!fc.length && <div className="text-xs text-slate-400">لا يوجد</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

  residencies: "الإقامات", custody: "عهدة الموظفين", cars: "سيارات الشركة",
  lpos: "أوامر الشراء", contracts: "عقود المقاولين",
  client_contracts: "عقود العملاء", project_payments: "الدفعات والمستحقات", payment_transactions: "تحصيلات الدفعات",
  gov_fees: "الرسوم الحكومية", office_expenses: "مصروفات المكتب",
};
const AUDIT_ACTION_LABELS = { insert: "إضافة", update: "تعديل", delete: "حذف" };
const AUDIT_ACTION_COLORS = { insert: "#16A34A", update: "#2E75B6", delete: "#E11D48" };

function AuditLogView() {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tableFilter, setTableFilter] = useState("");
  const [userFilter, setUserFilter] = useState("");

  const load = useCallback(async () => {
    setLoading(true);
    const { data } = await sb.from("audit_log").select("*").order("changed_at", { ascending: false }).limit(500);
    setRows(data || []);
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const users = Array.from(new Set(rows.map((r) => r.changed_by_email).filter(Boolean)));
  const filtered = rows.filter((r) => (!tableFilter || r.table_name === tableFilter) && (!userFilter || r.changed_by_email === userFilter));
  const inp = "text-xs rounded border border-slate-300 px-2 py-1.5";

  return (
    <div>
      <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
        <h2 className="text-lg font-bold" style={{ color: NAVY }}>سجل التدقيق</h2>
        <button onClick={load} style={{ background: BLUE }} className="text-white text-xs px-3 py-1.5 rounded-md hover:opacity-90">🔄 تحديث</button>
      </div>
      <div className="flex flex-wrap gap-2 mb-3">
        <select value={tableFilter} onChange={(e) => setTableFilter(e.target.value)} className={inp}>
          <option value="">كل الأقسام</option>
          {Object.keys(AUDIT_TABLE_LABELS).map((t) => <option key={t} value={t}>{AUDIT_TABLE_LABELS[t]}</option>)}
        </select>
        <select value={userFilter} onChange={(e) => setUserFilter(e.target.value)} className={inp} dir="ltr">
          <option value="">كل المستخدمين</option>
          {users.map((u) => <option key={u} value={u}>{u}</option>)}
        </select>
      </div>
      <div className="bg-white rounded-xl border border-slate-200 overflow-x-auto">
        <table className="w-full text-xs border-collapse">
          <thead><tr style={{ background: NAVY }} className="text-white">
            {["الوقت", "المستخدم", "القسم", "الإجراء"].map((h) => <th key={h} className="px-3 py-2 text-right">{h}</th>)}
          </tr></thead>
          <tbody>
            {loading && <tr><td colSpan={4} className="px-3 py-4 text-center text-slate-400">جارٍ التحميل...</td></tr>}
            {!loading && filtered.map((r) => (
              <tr key={r.id} className="border-b border-slate-100 hover:bg-slate-50">
                <td className="px-3 py-2 text-slate-500 whitespace-nowrap">{new Date(r.changed_at).toLocaleString("ar-EG")}</td>
                <td className="px-3 py-2" dir="ltr">{r.changed_by_email || "—"}</td>
                <td className="px-3 py-2 font-medium">{AUDIT_TABLE_LABELS[r.table_name] || r.table_name}</td>
                <td className="px-3 py-2">
                  <span className="text-white text-[11px] font-bold px-2 py-0.5 rounded-full" style={{ background: AUDIT_ACTION_COLORS[r.action] || "#94a3b8" }}>
                    {AUDIT_ACTION_LABELS[r.action] || r.action}
                  </span>
                </td>
              </tr>
            ))}
            {!loading && !filtered.length && <tr><td colSpan={4} className="px-3 py-4 text-center text-slate-400">لا يوجد سجلات</td></tr>}

        </table>

    </div>
  );
}

function ImageUploadField({ label, value, onChange, disabled }) {
  const handleFile = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => onChange(r.result);
    r.readAsDataURL(file);
  };
  return (
    <div>
      <div className="text-[10px] text-slate-500 mb-1">{label}</div>
      <input disabled={disabled} type="file" accept="image/*" onChange={(e) => handleFile(e.target.files && e.target.files[0])} className="text-xs" />
      {value && (
        <div className="mt-2 flex items-center gap-2">
          <img src={value} alt="" style={{ height: "40px", border: "1px solid #e5e7eb", borderRadius: "4px" }} />
          {!disabled && <button onClick={() => onChange("")} className="text-[11px] text-red-600 hover:underline">حذف</button>}
        </div>
      )}
    </div>
  );
}

function SettingsView({ company, employees, projects, sheets, canEdit, guard, flash, reload, profile, allData }) {

  const [draft, setDraft] = useState(company || {});
  useEffect(() => { setDraft(company || {}); }, [company]);
  const isOwner = profile.role === "owner";
  const [confirmDelete, setConfirmDelete] = useState(null); // employee object pending delete confirmation
  const [requests, setRequests] = useState([]);

  const loadRequests = useCallback(async () => {
    const { data } = await sb.from("employee_requests").select("*").order("created_at", { ascending: false });
    setRequests(data || []);
  }, []);
  useEffect(() => { loadRequests(); }, [loadRequests]);

  const saveCompany = async () => {
    if (!guard()) return;
    const { id, ...patch } = draft;
    const { error } = await sb.from("company_settings").update(patch).eq("id", 1);
    if (error) flash("خطأ: " + error.message); else { flash("تم حفظ بيانات الشركة"); reload(); }
  };

  const addEmployee = async () => {
    if (!guard()) return;
    if (isOwner) {
      const { error } = await sb.from("employees").insert({ name: "موظف جديد", salary: 0, ot_rate: 0, active: true, sort_order: employees.length });

    }

      type: "add", payload: { name: "موظف جديد", salary: 0, ot_rate: 0 },
      requested_by: profile.id, requested_by_email: profile.email,

  };
  const patchEmployee = async (id, field, val) => {
    if (!guard()) return;
    const { error } = await sb.from("employees").update({ [field]: val }).eq("id", id);
    if (error) flash("خطأ: " + error.message); else reload();
  };
  const requestDeleteEmployee = async (emp) => {
    if (!guard()) return;
    if (isOwner) {
      const { error } = await sb.from("employees").delete().eq("id", emp.id);
      if (error) flash("خطأ: " + error.message); else reload();
      setConfirmDelete(null);
      return;
    }
    const { error } = await sb.from("employee_requests").insert({
      type: "delete", employee_id: emp.id, payload: { name: emp.name },
      requested_by: profile.id, requested_by_email: profile.email,

  const reviewRequest = async (req, approve) => {
    if (!isOwner) return;
    if (approve) {
      if (req.type === "add") {
        const p = req.payload || {};
        const { error } = await sb.from("employees").insert({ name: p.name || "موظف جديد", salary: p.salary || 0, ot_rate: p.ot_rate || 0, active: true, sort_order: employees.length });
        if (error) { flash("خطأ: " + error.message); return; }
      } else if (req.type === "delete" && req.employee_id) {
        const { error } = await sb.from("employees").delete().eq("id", req.employee_id);
        if (error) { flash("خطأ: " + error.message); return; }
      }
    }
    await sb.from("employee_requests").update({
      status: approve ? "approved" : "rejected", reviewed_by: profile.id, reviewed_by_email: profile.email, reviewed_at: new Date().toISOString(),
    }).eq("id", req.id);
    flash(approve ? "تم قبول الطلب وتنفيذه" : "تم رفض الطلب");

    const { error } = await sb.from("projects").update({ [field]: val }).eq("id", id);
    if (error) flash("خطأ: " + error.message); else reload();

function BackupView({ allData, canEdit, profile, flash }) {
  const [busy, setBusy] = useState(false);
  const [history, setHistory] = useState([]);
  const [historyAvailable, setHistoryAvailable] = useState(true);
  const [autoOn, setAutoOn] = useState(() => {
    try { return window.localStorage.getItem("qagc-auto-backup") !== "off"; } catch (e) { return true; }
  });
  const [lastLocal, setLastLocal] = useState(() => {
    try { return window.localStorage.getItem("qagc-last-backup") || ""; } catch (e) { return ""; }
  });

  const loadHistory = useCallback(async () => {
    try {
      const { data, error } = await sb.from("backup_log").select("*").order("created_at", { ascending: false }).limit(20);
      if (error) throw error;
      setHistory(data || []);
      setHistoryAvailable(true);
    } catch (e) {
      setHistoryAvailable(false);
    }
  }, []);
  useEffect(() => { loadHistory(); }, [loadHistory]);

  const runBackup = async (trigger) => {
    setBusy(true);
    try {
      const wb = buildFullBackupWorkbook(allData);
      const stamp = new Date().toISOString().slice(0, 10);
      XLSX.writeFile(wb, "نسخة-احتياطية-قمم-الجبال-" + stamp + ".xlsx");
      const nowIso = new Date().toISOString();
      try { window.localStorage.setItem("qagc-last-backup", nowIso); } catch (e) {}
      setLastLocal(nowIso);
      try { await sb.from("backup_log").insert({ triggered_by: trigger, user_email: profile.email }); loadHistory(); } catch (e) {}
      flash("تم تحميل النسخة الاحتياطية");
    } catch (e) {
      flash("تعذّر إنشاء النسخة الاحتياطية: " + (e.message || ""));
    }
    setBusy(false);
  };

  const toggleAuto = () => {
    const next = !autoOn;
    setAutoOn(next);
    try { window.localStorage.setItem("qagc-auto-backup", next ? "on" : "off"); } catch (e) {}
    flash(next ? "تم تفعيل النسخ الاحتياطي التلقائي اليومي على هذا الجهاز" : "تم إيقاف النسخ الاحتياطي التلقائي اليومي على هذا الجهاز");
  };

  return (
    <div className="max-w-2xl">
      <div className="bg-white rounded-xl border border-slate-200 p-4 mb-4">

function UsersView({ profile, flash }) {

    const { data } = await sb.from("profiles").select("*").order("created_at");

      </p>

/* المشاريع: قائمة + ملف مشروع (عقود العميل / المستحقات / ملخص التكلفة) */
